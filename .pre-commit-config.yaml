repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
    -   id: ruff
        args: [--fix]
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
    -   id: mypy
        pass_filenames: false
        args: [src/, tests/, examples/]
        additional_dependencies:
        - pydantic>=2.7.0
        - typer>=0.12.0
        - rich>=13.7.1
        - pytest>=9.0.3
        - networkx>=3.0.0
        - pyvis>=0.3.2
