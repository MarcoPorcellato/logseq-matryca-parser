name: Logos Protocol CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.12"
        enable-cache: true

    - name: Sync dependencies
      run: uv sync --all-extras

    - name: Lint
      run: make lint

    - name: Type check
      run: make check

    - name: Test
      run: make test
