              const observer = new MutationObserver(() => {
                sidebar.scrollTop = lastScroll;
              });

              // Observe changes to the children of the config div
              observer.observe(configDiv, { childList: true, subtree: true });
            }
          }, 500);
        })();
        </script></body>
</html>
